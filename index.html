<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <script src="libraries/p5.min.js"></script>
  <script src="libraries/p5.sound.min.js"></script>
  <link rel="stylesheet" type="text/css" href="style.css">
  <meta charset="utf-8" />
  <style>
    body { margin: 0; padding: 0; overflow: hidden; }
    #iframe-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80%;
      height: 80%;
      background: white;
      display: none;
      border: 5px solid #2a5298;
      border-radius: 15px;
      z-index: 100;
    }
    iframe { width: 100%; height: 100%; border: none; }
    #close-btn {
      position: absolute;
      top: -20px;
      right: -20px;
      background: #ff4b2b;
      color: white;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="iframe-container">
    <button id="close-btn" onclick="closeIframe()">X</button>
    <iframe id="assignment-frame" src=""></iframe>
  </div>
  <script src="sketch.js"></script>
  <script>
    function closeIframe() { document.getElementById('iframe-container').style.display = 'none'; }
  </script>
</body>
</html>
